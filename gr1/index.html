<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Gradient</title>
<style>
  :root {
    --panel-bg: rgba(20,20,22,0.72);
    --panel-fg: #f4f4f4;
    --panel-muted: #9a9a9a;
    --panel-border: rgba(255,255,255,0.08);
  }
  html, body { margin: 0; height: 100%; background: #000; overflow: hidden; font-family: -apple-system, "Segoe UI", Roboto, sans-serif; color: var(--panel-fg); }
  canvas { display: block; width: 100vw; height: 100vh; }

  #toggle {
    position: fixed; top: 16px; right: 16px; z-index: 10;
    width: 40px; height: 40px; border-radius: 50%;
    background: var(--panel-bg); border: 1px solid var(--panel-border);
    color: var(--panel-fg);
    display: grid; place-items: center; cursor: pointer;
    backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
    transition: transform 0.2s ease, background 0.2s ease;
  }
  #toggle:hover { background: rgba(40,40,44,0.85); }
  #toggle svg { width: 18px; height: 18px; transition: transform 0.3s ease; }
  body.menu-open #toggle svg { transform: rotate(90deg); }

  /* Click-anywhere toggle for UI visibility */
  #toggle { transition: transform 0.2s ease, background 0.2s ease, opacity 0.3s ease; }
  body.ui-hidden #toggle { opacity: 0; pointer-events: none; }

  #panel {
    position: fixed; top: 68px; right: 16px; z-index: 9;
    width: 260px; padding: 16px;
    background: var(--panel-bg); border: 1px solid var(--panel-border); border-radius: 12px;
    backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
    transform: translateX(calc(100% + 24px)); opacity: 0; pointer-events: none;
    transition: transform 0.25s ease, opacity 0.25s ease;
    max-height: calc(100vh - 96px); overflow-y: auto;
  }
  body.menu-open #panel { transform: translateX(0); opacity: 1; pointer-events: auto; }

  .slider-row { display: block; margin: 12px 0; font-size: 12px; }
  .slider-row .top { display: flex; justify-content: space-between; color: var(--panel-muted); letter-spacing: 0.04em; text-transform: uppercase; }
  .slider-row .val { font-variant-numeric: tabular-nums; color: var(--panel-fg); font-size: 11px; }

  input[type=range] { -webkit-appearance: none; appearance: none; width: 100%; background: transparent; margin: 4px 0 0; }
  input[type=range]::-webkit-slider-runnable-track { height: 2px; background: rgba(255,255,255,0.18); border-radius: 2px; }
  input[type=range]::-moz-range-track { height: 2px; background: rgba(255,255,255,0.18); border-radius: 2px; }
  input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; appearance: none; width: 12px; height: 12px; background: #fff; border-radius: 50%; margin-top: -5px; cursor: pointer; }
  input[type=range]::-moz-range-thumb { width: 12px; height: 12px; background: #fff; border: none; border-radius: 50%; cursor: pointer; }

  .colors { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; margin-bottom: 8px; }
  .colors input[type=color] {
    -webkit-appearance: none; appearance: none; border: none; padding: 0; background: transparent;
    width: 100%; aspect-ratio: 1; border-radius: 8px; overflow: hidden; cursor: pointer;
  }
  .colors input[type=color]::-webkit-color-swatch-wrapper { padding: 0; }
  .colors input[type=color]::-webkit-color-swatch { border: 1px solid var(--panel-border); border-radius: 8px; }
  .colors input[type=color]::-moz-color-swatch { border: 1px solid var(--panel-border); border-radius: 8px; }

  .section { font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--panel-muted); margin: 4px 0 8px; }
  hr { border: none; border-top: 1px solid var(--panel-border); margin: 14px 0; }

  .actions { display: flex; gap: 8px; margin-top: 4px; }
  .actions button {
    flex: 1; padding: 8px; font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase;
    background: rgba(255,255,255,0.06); color: var(--panel-fg);
    border: 1px solid var(--panel-border); border-radius: 8px; cursor: pointer;
  }
  .actions button:hover { background: rgba(255,255,255,0.12); }

  .live-row { display: flex; align-items: center; gap: 6px; margin-bottom: 4px; font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--panel-muted); }
  .live-dot { width: 7px; height: 7px; border-radius: 50%; background: #555; box-shadow: 0 0 0 0 rgba(0,0,0,0); }
  .live-dot.live { background: #4ade80; box-shadow: 0 0 8px rgba(74,222,128,0.6); }
  .live-dot.error { background: #f87171; }

  /* Responsive panel for phones */
  @media (max-width: 520px) {
    #panel { width: auto; left: 12px; right: 12px; top: 64px; padding: 14px; }
    #toggle { top: 12px; right: 12px; }
  }
  @media (max-height: 640px) {
    #panel { max-height: calc(100vh - 80px); }
  }
</style>
</head>
<body>
<div id="canvas-host"></div>

<button id="toggle" aria-label="Toggle controls">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="12" cy="12" r="3"/>
    <path d="M19.4 15a1.7 1.7 0 0 0 .3 1.8l.1.1a2 2 0 1 1-2.8 2.8l-.1-.1a1.7 1.7 0 0 0-1.8-.3 1.7 1.7 0 0 0-1 1.5V21a2 2 0 1 1-4 0v-.1a1.7 1.7 0 0 0-1.1-1.5 1.7 1.7 0 0 0-1.8.3l-.1.1a2 2 0 1 1-2.8-2.8l.1-.1a1.7 1.7 0 0 0 .3-1.8 1.7 1.7 0 0 0-1.5-1H3a2 2 0 1 1 0-4h.1a1.7 1.7 0 0 0 1.5-1.1 1.7 1.7 0 0 0-.3-1.8l-.1-.1a2 2 0 1 1 2.8-2.8l.1.1a1.7 1.7 0 0 0 1.8.3H9a1.7 1.7 0 0 0 1-1.5V3a2 2 0 1 1 4 0v.1a1.7 1.7 0 0 0 1 1.5 1.7 1.7 0 0 0 1.8-.3l.1-.1a2 2 0 1 1 2.8 2.8l-.1.1a1.7 1.7 0 0 0-.3 1.8V9a1.7 1.7 0 0 0 1.5 1H21a2 2 0 1 1 0 4h-.1a1.7 1.7 0 0 0-1.5 1z"/>
  </svg>
</button>

<aside id="panel">
  <div class="live-row"><span id="liveDot" class="live-dot"></span><span id="liveLabel">offline</span></div>
  <div class="section">Colors</div>
  <div class="colors">
    <input type="color" id="c1" value="#000000" />
    <input type="color" id="c2" value="#406069" />
    <input type="color" id="c3" value="#023047" />
    <input type="color" id="c4" value="#925689" />
    <input type="color" id="c5" value="#FB8500" />
  </div>

  <hr />
  <div class="section">Mesh</div>

  <div class="slider-row">
    <div class="top"><span>Sharpness</span><span class="val" id="sharpVal">12.0</span></div>
    <input type="range" id="sharp" min="1" max="32" step="0.1" value="12.0" />
  </div>
  <div class="slider-row">
    <div class="top"><span>Displacement</span><span class="val" id="ampVal">0.20</span></div>
    <input type="range" id="amp" min="0" max="1.2" step="0.01" value="0.20" />
  </div>
  <div class="slider-row">
    <div class="top"><span>Flow Up</span><span class="val" id="flowVal">0.80</span></div>
    <input type="range" id="flow" min="0" max="3" step="0.01" value="0.80" />
  </div>
  <div class="slider-row">
    <div class="top"><span>Warp</span><span class="val" id="warpVal">1.00</span></div>
    <input type="range" id="warp" min="0" max="3" step="0.01" value="1.00" />
  </div>
  <div class="slider-row">
    <div class="top"><span>Rotation</span><span class="val" id="rotVal">0.50</span></div>
    <input type="range" id="rot" min="0" max="2" step="0.01" value="0.50" />
  </div>
  <div class="slider-row">
    <div class="top"><span>Landscape</span><span class="val" id="landVal">0.00</span></div>
    <input type="range" id="land" min="0" max="1" step="0.01" value="0.00" />
  </div>
  <div class="slider-row">
    <div class="top"><span>Grain</span><span class="val" id="grainVal">0.10</span></div>
    <input type="range" id="grain" min="0" max="0.5" step="0.001" value="0.10" />
  </div>
  <div class="slider-row">
    <div class="top"><span>Shading</span><span class="val" id="shadeVal">0.35</span></div>
    <input type="range" id="shade" min="0" max="1" step="0.01" value="0.35" />
  </div>
  <div class="slider-row">
    <div class="top"><span>Loop Speed</span><span class="val" id="speedVal">0.10</span></div>
    <input type="range" id="speed" min="0" max="1" step="0.005" value="0.10" />
  </div>

  <div class="actions">
    <button id="randomize">Randomize</button>
    <button id="copyLink">Copy Link</button>
  </div>
</aside>

<script type="importmap">
{ "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
</script>

<script type="module">
import * as THREE from 'three';

// ---------- state ----------
const state = {
  c1: '#000000', c2: '#406069', c3: '#023047', c4: '#925689', c5: '#FB8500',
  sharp: 12.0, amp: 0.20, flow: 0.80, warp: 1.00, rot: 0.50, land: 0.00,
  grain: 0.10, shade: 0.35, speed: 0.10,
};

const params = new URLSearchParams(location.search);
['c1','c2','c3','c4','c5'].forEach(k => {
  const v = params.get(k);
  if (v) state[k] = '#' + v.replace('#','');
});
const aliases = {
  sharp:['sharp','spread'], amp:['amp','fy','disp'], flow:['flow'],
  warp:['warp'], rot:['rot'], land:['land','landscape'], grain:['grain','amount'],
  shade:['shade'], speed:['speed'],
};
for (const k in aliases) {
  for (const a of aliases[k]) {
    const v = params.get(a);
    if (v !== null) { state[k] = parseFloat(v); break; }
  }
}

// ---------- three.js ----------
const host = document.getElementById('canvas-host');
const renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: 'high-performance' });
renderer.setPixelRatio(Math.min(devicePixelRatio || 1, 2));
host.appendChild(renderer.domElement);

const scene = new THREE.Scene();
const camera = new THREE.OrthographicCamera(-1, 1, 1, -1, -10, 10);
camera.position.set(0, 0, 2);
camera.lookAt(0, 0, 0);

// Adaptive plane resolution — phones get fewer verts, big screens get more.
const minDim0 = Math.min(innerWidth, innerHeight);
const SEG = minDim0 < 480 ? 96 : (minDim0 < 800 ? 160 : 256);
const geometry = new THREE.PlaneGeometry(2, 2, SEG, SEG);

const hexToVec3 = (hex) => {
  const h = hex.replace('#','');
  return new THREE.Vector3(
    parseInt(h.slice(0,2),16)/255,
    parseInt(h.slice(2,4),16)/255,
    parseInt(h.slice(4,6),16)/255,
  );
};

const uniforms = {
  uTime:    { value: 0 },
  uAspect:  { value: 1 },
  uSpeed:   { value: state.speed },
  uSharp:   { value: state.sharp },
  uAmp:     { value: state.amp },
  uFlow:    { value: state.flow },
  uWarp:    { value: state.warp },
  uRot:     { value: state.rot },
  uLand:    { value: state.land },
  uGrain:   { value: state.grain },
  uShade:   { value: state.shade },
  uC1: { value: hexToVec3(state.c1) },
  uC2: { value: hexToVec3(state.c2) },
  uC3: { value: hexToVec3(state.c3) },
  uC4: { value: hexToVec3(state.c4) },
  uC5: { value: hexToVec3(state.c5) },
};

// Shared field code: rotated/warped UV → 5 orbiting blob centers → inverse-distance blend.
// Every time term is sin(theta) / cos(theta) with multiplier 1, so the loop closes at theta = 2*PI.
const FIELD_GLSL = `
mat2 rot2(float a) { float c = cos(a), s = sin(a); return mat2(c, -s, s, c); }

// Returns (weight1..5, dominantWeight) so vertex shader can use the dominant weight as height.
// landscape ∈ [0,1] morphs the distance metric from 2D blob → 1D vertical bands (c1 bottom, c5 top).
void blobWeights(vec2 tuv, float theta, float sharp, float warp, float rotAmt, float landscape,
                 out float w1, out float w2, out float w3, out float w4, out float w5) {
  // suppress rotation as we approach landscape mode (keeps the horizon level)
  float rotEff = rotAmt * (1.0 - landscape);
  tuv = rot2(sin(theta) * rotEff) * tuv;

  // wave warp — period preserved because sin args use integer multiples of theta
  tuv.x += sin(tuv.y * 5.0 + theta * 2.0) * (warp / 30.0);
  tuv.y += sin(tuv.x * 7.5 + theta * 2.0) * (warp / 15.0);

  // 5 blob orbits — sin/cos of theta with phase offsets; closes at 2*PI
  vec2 p1 = vec2(sin(theta            ) * 0.30, cos(theta            ) * 0.25);
  vec2 p2 = vec2(cos(theta + 1.10     ) * 0.30, sin(theta + 1.55     ) * 0.22);
  vec2 p3 = vec2(sin(theta + 2.20     ) * 0.22, cos(theta + 1.30     ) * 0.30);
  vec2 p4 = vec2(cos(theta + 3.05     ) * 0.27, sin(theta + 2.40     ) * 0.24);
  vec2 p5 = vec2(sin(theta + 4.40     ) * 0.20, cos(theta + 3.70     ) * 0.20);

  // 5 horizontal band y-anchors, c1 bottom → c5 top
  const float by1 = -0.80;
  const float by2 = -0.40;
  const float by3 =  0.00;
  const float by4 =  0.40;
  const float by5 =  0.80;

  // distance morphs from full 2D length to pure |Δy| as landscape→1
  float d1 = mix(length(tuv - p1), abs(tuv.y - by1), landscape);
  float d2 = mix(length(tuv - p2), abs(tuv.y - by2), landscape);
  float d3 = mix(length(tuv - p3), abs(tuv.y - by3), landscape);
  float d4 = mix(length(tuv - p4), abs(tuv.y - by4), landscape);
  float d5 = mix(length(tuv - p5), abs(tuv.y - by5), landscape);

  w1 = 1.0 / (pow(d1, sharp) + 0.01);
  w2 = 1.0 / (pow(d2, sharp) + 0.01);
  w3 = 1.0 / (pow(d3, sharp) + 0.01);
  w4 = 1.0 / (pow(d4, sharp) + 0.01);
  w5 = 1.0 / (pow(d5, sharp) + 0.01);
}

// Mesh height field: log of dominant weight, smoothed. Bumps lie under each blob center.
float heightField(vec2 tuv, float theta, float sharp, float warp, float rotAmt, float landscape) {
  float w1, w2, w3, w4, w5;
  blobWeights(tuv, theta, sharp, warp, rotAmt, landscape, w1, w2, w3, w4, w5);
  float total = w1 + w2 + w3 + w4 + w5;
  // dominance ratio: how much one blob dominates this pixel
  float top = max(max(max(max(w1, w2), w3), w4), w5);
  return clamp(top / total, 0.0, 1.0);
}
`;

const VERT = `
${FIELD_GLSL}

uniform float uTime;
uniform float uSpeed;
uniform float uAmp;
uniform float uSharp;
uniform float uFlow;
uniform float uWarp;
uniform float uRot;
uniform float uLand;
uniform float uAspect;

varying vec2 vBaseTuv;
varying float vLooped;
varying vec3 vNormal;

float disp(vec2 tuv, float theta) {
  // a softer, smoother variant for displacement (lower sharp keeps mesh from spiking)
  return heightField(tuv, theta, max(uSharp * 0.35, 1.5), uWarp, uRot, uLand);
}

void main() {
  float TAU = 6.28318530718;
  float looped = fract(uTime * uSpeed);
  float theta  = looped * TAU;

  // base UV in centered, aspect-corrected space
  vec2 baseTuv = vec2(position.x * uAspect, position.y);

  // upward flow via dual-sample crossfade
  vec2 tuvA = baseTuv + vec2(0.0, -looped         * uFlow);
  vec2 tuvB = baseTuv + vec2(0.0, -(looped - 1.0) * uFlow);

  float dA = disp(tuvA, theta);
  float dB = disp(tuvB, theta);
  float h  = mix(dA, dB, looped);

  // finite-difference normals from the same height field
  float e = 0.012;
  float dAx = disp(tuvA + vec2(e, 0.0), theta);
  float dBx = disp(tuvB + vec2(e, 0.0), theta);
  float dAy = disp(tuvA + vec2(0.0, e), theta);
  float dBy = disp(tuvB + vec2(0.0, e), theta);
  float hx = mix(dAx, dBx, looped);
  float hy = mix(dAy, dBy, looped);

  vec3 p  = vec3(position.x, position.y, position.z + h  * uAmp);
  vec3 px = vec3(position.x + e, position.y, position.z + hx * uAmp);
  vec3 py = vec3(position.x, position.y + e, position.z + hy * uAmp);
  vNormal = normalize(cross(px - p, py - p));

  vBaseTuv = baseTuv;
  vLooped  = looped;

  gl_Position = projectionMatrix * modelViewMatrix * vec4(p, 1.0);
}
`;

const FRAG = `
precision highp float;
${FIELD_GLSL}

uniform float uTime;
uniform float uSpeed;
uniform float uSharp;
uniform float uFlow;
uniform float uWarp;
uniform float uRot;
uniform float uLand;
uniform float uGrain;
uniform float uShade;
uniform vec3 uC1, uC2, uC3, uC4, uC5;

varying vec2 vBaseTuv;
varying float vLooped;
varying vec3 vNormal;

float hash21(vec2 p) {
  p = fract(p * vec2(123.34, 456.21));
  p += dot(p, p + 45.32);
  return fract(p.x * p.y);
}

vec3 sampleField(vec2 tuv, float theta) {
  float w1, w2, w3, w4, w5;
  blobWeights(tuv, theta, uSharp, uWarp, uRot, uLand, w1, w2, w3, w4, w5);
  float total = w1 + w2 + w3 + w4 + w5;
  return (uC1*w1 + uC2*w2 + uC3*w3 + uC4*w4 + uC5*w5) / total;
}

void main() {
  float TAU = 6.28318530718;
  float looped = vLooped;
  float theta  = looped * TAU;

  vec2 tuvA = vBaseTuv + vec2(0.0, -looped         * uFlow);
  vec2 tuvB = vBaseTuv + vec2(0.0, -(looped - 1.0) * uFlow);

  vec3 cA = sampleField(tuvA, theta);
  vec3 cB = sampleField(tuvB, theta);
  vec3 col = mix(cA, cB, looped);

  // dimensional shading from displaced normal
  vec3 lightDir = normalize(vec3(0.30, 0.55, 1.0));
  float ndl = clamp(dot(normalize(vNormal), lightDir), 0.0, 1.0);
  float shade = mix(1.0, 0.55 + 0.55 * ndl, uShade);
  col *= shade;

  // film grain — subtractive, like the reference
  float gphase = fract(uTime * uSpeed);
  col -= length(hash21(gl_FragCoord.xy + gphase * 31.0)) * uGrain;

  gl_FragColor = vec4(col, 1.0);
}
`;

const material = new THREE.ShaderMaterial({
  uniforms,
  vertexShader: VERT,
  fragmentShader: FRAG,
});

const mesh = new THREE.Mesh(geometry, material);
scene.add(mesh);

// ---------- resize ----------
function resize() {
  const w = innerWidth, h = innerHeight;
  renderer.setSize(w, h, false);
  const aspect = w / h;
  uniforms.uAspect.value = aspect;
  if (aspect >= 1) {
    camera.left = -aspect; camera.right = aspect;
    camera.top = 1; camera.bottom = -1;
  } else {
    camera.left = -1; camera.right = 1;
    camera.top = 1 / aspect; camera.bottom = -1 / aspect;
  }
  camera.updateProjectionMatrix();
  const cover = Math.max(aspect, 1 / aspect) * 1.05;
  mesh.scale.set(cover, cover, 1);
}
resize();
addEventListener('resize', resize);

// ---------- UI wiring ----------
const sliders = ['sharp','amp','flow','warp','rot','land','grain','shade','speed'];
const labelIds = {
  sharp:'sharpVal', amp:'ampVal', flow:'flowVal', warp:'warpVal',
  rot:'rotVal', land:'landVal', grain:'grainVal', shade:'shadeVal', speed:'speedVal',
};
const fmt = (k, v) => (k === 'grain') ? v.toFixed(3) : (k === 'sharp' ? v.toFixed(1) : v.toFixed(2));

function syncInputs(respectLocks) {
  for (const k of ['c1','c2','c3','c4','c5']) {
    if (respectLocks && isLocked(k)) continue;
    document.getElementById(k).value = state[k];
  }
  for (const k of sliders) {
    if (respectLocks && isLocked(k)) continue;
    document.getElementById(k).value = state[k];
    document.getElementById(labelIds[k]).textContent = fmt(k, +state[k]);
  }
}

// ---------- realtime sync (locks + throttled broadcast) ----------
const lockUntil = {};
const isLocked = (k) => (lockUntil[k] || 0) > performance.now();
const lock = (k) => { lockUntil[k] = performance.now() + 600; };

let dbRef = null, dbUpdate = null, dbSet = null;
let writeTimer = null;
const pendingWrite = {};

function broadcast(updates) {
  Object.assign(pendingWrite, updates);
  if (!dbRef || writeTimer) return;
  writeTimer = setTimeout(() => {
    if (Object.keys(pendingWrite).length) {
      dbUpdate(dbRef, { ...pendingWrite }).catch(() => {});
    }
    for (const k in pendingWrite) delete pendingWrite[k];
    writeTimer = null;
  }, 80);
}

function onLocalEdit(keys) {
  const arr = Array.isArray(keys) ? keys : [keys];
  const u = {};
  for (const k of arr) { lock(k); u[k] = state[k]; }
  broadcast(u);
}

syncInputs(false);

function pushUniforms() {
  uniforms.uC1.value.copy(hexToVec3(state.c1));
  uniforms.uC2.value.copy(hexToVec3(state.c2));
  uniforms.uC3.value.copy(hexToVec3(state.c3));
  uniforms.uC4.value.copy(hexToVec3(state.c4));
  uniforms.uC5.value.copy(hexToVec3(state.c5));
  uniforms.uSharp.value = state.sharp;
  uniforms.uAmp.value   = state.amp;
  uniforms.uFlow.value  = state.flow;
  uniforms.uWarp.value  = state.warp;
  uniforms.uRot.value   = state.rot;
  uniforms.uLand.value  = state.land;
  uniforms.uGrain.value = state.grain;
  uniforms.uShade.value = state.shade;
  uniforms.uSpeed.value = state.speed;
}
pushUniforms();

for (const k of ['c1','c2','c3','c4','c5']) {
  const el = document.getElementById(k);
  el.addEventListener('input', () => {
    state[k] = el.value;
    pushUniforms();
    onLocalEdit(k);
  });
}
for (const k of sliders) {
  const el = document.getElementById(k);
  const lab = document.getElementById(labelIds[k]);
  el.addEventListener('input', () => {
    state[k] = parseFloat(el.value);
    lab.textContent = fmt(k, state[k]);
    pushUniforms();
    onLocalEdit(k);
  });
}

document.getElementById('toggle').addEventListener('click', (e) => {
  e.stopPropagation();
  document.body.classList.toggle('menu-open');
});

// Clicking anywhere on the canvas toggles the gear icon visibility.
// (Clicks inside the panel or on the gear itself are ignored.)
document.addEventListener('click', (e) => {
  if (e.target.closest('#panel') || e.target.closest('#toggle')) return;
  if (document.body.classList.contains('ui-hidden')) {
    document.body.classList.remove('ui-hidden');
  } else {
    document.body.classList.add('ui-hidden');
    document.body.classList.remove('menu-open');
  }
});

document.getElementById('randomize').addEventListener('click', () => {
  const rand = () => Math.floor(Math.random() * 256).toString(16).padStart(2, '0');
  for (const k of ['c1','c2','c3','c4','c5']) state[k] = '#' + rand() + rand() + rand();
  state.sharp = +(4   + Math.random() * 16 ).toFixed(1);
  state.amp   = +(0.10 + Math.random() * 0.5).toFixed(2);
  state.flow  = +(0.30 + Math.random() * 1.5).toFixed(2);
  state.warp  = +(0.20 + Math.random() * 1.6).toFixed(2);
  state.rot   = +(0.20 + Math.random() * 1.0).toFixed(2);
  syncInputs(false); pushUniforms();
  onLocalEdit(['c1','c2','c3','c4','c5','sharp','amp','flow','warp','rot','land']);
});

document.getElementById('copyLink').addEventListener('click', async () => {
  const p = new URLSearchParams();
  for (const k of ['c1','c2','c3','c4','c5']) p.set(k, state[k].replace('#',''));
  for (const k of sliders) p.set(k, state[k]);
  const url = location.origin + location.pathname + '?' + p.toString();
  try { await navigator.clipboard.writeText(url); } catch(e) {}
  const btn = document.getElementById('copyLink');
  const orig = btn.textContent; btn.textContent = 'Copied';
  setTimeout(() => btn.textContent = orig, 1200);
});

// ---------- Firebase Realtime DB sync ----------
// Public Web config — apiKey is not a secret; security is enforced by RTDB rules.
const FIREBASE_CONFIG = {
  apiKey: "AIzaSyCFrMyD6U7sJHYFHlOohJHSFKlMU8o--Ok",
  authDomain: "ras-common.firebaseapp.com",
  databaseURL: "https://ras-common-default-rtdb.firebaseio.com",
  projectId: "ras-common",
  storageBucket: "ras-common.firebasestorage.app",
  messagingSenderId: "200756867763",
  appId: "1:200756867763:web:d704fb7843528121aaf6c6"
};

const liveDot = document.getElementById('liveDot');
const liveLabel = document.getElementById('liveLabel');

if (FIREBASE_CONFIG.databaseURL && FIREBASE_CONFIG.apiKey) {
  try {
    const fbApp = await import('https://www.gstatic.com/firebasejs/10.12.4/firebase-app.js');
    const fbDb  = await import('https://www.gstatic.com/firebasejs/10.12.4/firebase-database.js');
    const app = fbApp.initializeApp(FIREBASE_CONFIG);
    const db = fbDb.getDatabase(app);
    dbRef    = fbDb.ref(db, 'gr1/state');
    dbUpdate = fbDb.update;
    dbSet    = fbDb.set;

    fbDb.onValue(dbRef, (snap) => {
      const remote = snap.val();
      if (!remote) {
        // Empty DB — seed it with current local state so other clients have something to read.
        dbSet(dbRef, { ...state }).catch(() => {});
        return;
      }
      let dirty = false;
      for (const k of Object.keys(state)) {
        if (k in remote && !isLocked(k) && state[k] !== remote[k]) {
          state[k] = remote[k];
          dirty = true;
        }
      }
      if (dirty) { syncInputs(true); pushUniforms(); }
    }, (err) => {
      console.warn('RTDB read error', err);
      liveDot.classList.remove('live'); liveDot.classList.add('error');
      liveLabel.textContent = 'sync error';
    });

    liveDot.classList.add('live');
    liveLabel.textContent = 'live';
  } catch (e) {
    console.warn('Firebase init failed', e);
    liveDot.classList.add('error');
    liveLabel.textContent = 'sync error';
  }
} else {
  liveLabel.textContent = 'local only';
}

// ---------- render loop ----------
const t0 = performance.now();
function frame() {
  uniforms.uTime.value = (performance.now() - t0) / 1000;
  renderer.render(scene, camera);
  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);
</script>
