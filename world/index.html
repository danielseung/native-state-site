<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Native State · Members</title>
<style>
  @font-face { font-family: 'ABCFavorit'; src: url('../fonts/ABCFavorit-Light-Trial.otf') format('opentype'); font-weight: 300; }
  @font-face { font-family: 'ABCFavorit'; src: url('../fonts/ABCFavorit-Book-Trial.otf') format('opentype'); font-weight: 350; }
  @font-face { font-family: 'ABCFavorit'; src: url('../fonts/ABCFavorit-Regular-Trial.otf') format('opentype'); font-weight: 400; }
  @font-face { font-family: 'ABCFavorit'; src: url('../fonts/ABCFavorit-Medium-Trial.otf') format('opentype'); font-weight: 500; }
  @font-face { font-family: 'ABCMonumentGroteskMono'; src: url('../fonts/ABCMonumentGroteskMono-Regular-Trial.otf') format('opentype'); font-weight: 400; }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { font-size: 16px; }

  :root {
    --bg: #fff; --fg: #111; --fg-dim: #888; --fg-dimmer: #bbb; --fg-faint: #ccc;
    --border: #e8e8e8; --border-light: #f2f2f2; --input-bg: #fff;
    --accent: #111; --danger: #c4341a;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #111; --fg: #f0f0ee; --fg-dim: #888; --fg-dimmer: #555; --fg-faint: #444;
      --border: #222; --border-light: #1a1a1a; --input-bg: #1a1a1a;
      --accent: #f0f0ee; --danger: #ff6a4d;
    }
  }

  body {
    background: var(--bg); color: var(--fg);
    font-family: 'ABCFavorit', 'Helvetica Neue', sans-serif;
    font-weight: 300; -webkit-font-smoothing: antialiased; line-height: 1.5;
    min-height: 100vh;
  }
  a { color: inherit; text-decoration: none; }
  button { font-family: inherit; cursor: pointer; }
  input, textarea { font-family: inherit; }

  .mono { font-family: 'ABCMonumentGroteskMono', monospace; }

  /* ── Topbar ── */
  .topbar {
    position: sticky; top: 0; z-index: 100;
    background: var(--bg); border-bottom: 1px solid var(--border);
    display: grid; grid-template-columns: 1fr auto 1fr;
    align-items: center; padding: 10px 32px;
    font-family: 'ABCMonumentGroteskMono', monospace;
    font-size: 10px; letter-spacing: 0.14em; color: var(--fg);
  }
  .topbar .brand { color: var(--fg); }
  .topbar .center { text-align: center; }
  .topbar .right { text-align: right; display: flex; gap: 16px; justify-content: flex-end; align-items: center; }
  .topbar .right a, .topbar .right button {
    color: var(--fg); background: none; border: none; padding: 0;
    font-family: inherit; font-size: 10px; letter-spacing: 0.14em; cursor: pointer;
  }
  .topbar .right a:hover, .topbar .right button:hover { color: var(--fg); }
  .topbar .right .me { color: var(--fg); }

  /* ── Tabs ── */
  .tabs {
    display: flex; gap: 0; border-bottom: 1px solid var(--border);
    padding: 0 32px;
    font-family: 'ABCMonumentGroteskMono', monospace;
    font-size: 10px; letter-spacing: 0.14em;
  }
  .tabs a {
    padding: 14px 18px 12px; color: var(--fg);
    border-bottom: 2px solid transparent; margin-bottom: -1px;
  }
  .tabs a:first-child { padding-left: 0; }
  .tabs a:hover { color: var(--fg); }
  .tabs a.active { color: var(--fg); border-bottom-color: var(--fg); }
  .tabs .admin-only { display: none; }
  body.is-admin .tabs .admin-only { display: inline-block; }

  /* ── Layout ── */
  .container { max-width: 1200px; margin: 0 auto; padding: 0 32px; }
  .view { padding: 40px 0 80px; }
  .view-header {
    display: flex; justify-content: space-between; align-items: baseline;
    padding-bottom: 18px; margin-bottom: 24px;
    border-bottom: 1px solid var(--border);
  }
  .view-title { font-size: 28px; font-weight: 400; letter-spacing: -0.02em; }
  .view-subtitle {
    font-family: 'ABCMonumentGroteskMono', monospace;
    font-size: 10px; letter-spacing: 0.14em; color: var(--fg);
  }
  .empty {
    padding: 80px 0; text-align: center; color: var(--fg);
    font-family: 'ABCMonumentGroteskMono', monospace;
    font-size: 11px; letter-spacing: 0.14em;
  }

  /* ── Forms ── */
  .field { margin-bottom: 20px; }
  .field label {
    display: block; font-family: 'ABCMonumentGroteskMono', monospace;
    font-size: 10px; letter-spacing: 0.14em; color: var(--fg);
    margin-bottom: 6px;
  }
  .field input, .field textarea, .field select {
    width: 100%; padding: 10px 12px;
    background: var(--input-bg); color: var(--fg);
    border: 1px solid var(--border); outline: none;
    font-size: 14px; font-weight: 300;
  }
  .field input:focus, .field textarea:focus, .field select:focus { border-color: var(--fg); }
  .field textarea { resize: vertical; min-height: 80px; }
  .field .hint {
    font-family: 'ABCMonumentGroteskMono', monospace;
    font-size: 10px; color: var(--fg); margin-top: 4px;
  }
  .btn {
    display: inline-block; padding: 10px 18px;
    background: var(--fg); color: var(--bg); border: 1px solid var(--fg);
    font-family: 'ABCMonumentGroteskMono', monospace;
    font-size: 11px; letter-spacing: 0.12em; cursor: pointer;
  }
  .btn:hover { opacity: 0.85; }
  .btn.ghost { background: transparent; color: var(--fg); }
  .btn.small { padding: 6px 12px; font-size: 10px; }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .msg { padding: 12px 14px; margin: 16px 0; border: 1px solid var(--border);
         font-family: 'ABCMonumentGroteskMono', monospace; font-size: 11px; }
  .msg.error { border-color: var(--danger); color: var(--danger); }
  .msg.ok { border-color: var(--fg); }

  /* ── Login view ── */
  .login-wrap {
    min-height: calc(100vh - 41px);
    display: grid; place-items: center; padding: 40px 32px;
  }
  .login-card { max-width: 380px; width: 100%; }
  .login-card h1 {
    font-size: 32px; font-weight: 400; letter-spacing: -0.02em; margin-bottom: 8px;
  }
  .login-card .sub {
    color: var(--fg); font-size: 13px; margin-bottom: 32px; line-height: 1.6;
  }

  /* ── Directory ── */
  .dir-grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 1px; background: var(--border);
    border: 1px solid var(--border);
  }
  .dir-card {
    background: var(--bg); padding: 22px 20px; cursor: pointer;
    transition: background 0.15s ease;
  }
  .dir-card:hover { background: var(--border-light); }
  .dir-card .handle {
    font-family: 'ABCMonumentGroteskMono', monospace;
    font-size: 10px; letter-spacing: 0.14em; color: var(--fg); margin-bottom: 6px;
  }
  .dir-card .name { font-size: 16px; font-weight: 400; margin-bottom: 8px; }
  .dir-card .bio { font-size: 12px; color: var(--fg); line-height: 1.55; margin-bottom: 12px; }
  .dir-card .meta {
    font-family: 'ABCMonumentGroteskMono', monospace;
    font-size: 9px; letter-spacing: 0.12em; color: var(--fg);
  }
  .presence-dot {
    display: inline-block; width: 6px; height: 6px; border-radius: 50%;
    background: var(--fg-faint); vertical-align: middle; margin-left: 6px;
  }
  .presence-dot.online { background: #4ade80; box-shadow: 0 0 6px rgba(74,222,128,0.5); }

  /* ── Avatars ── */
  .avatar {
    display: inline-block; vertical-align: middle; flex-shrink: 0;
    width: 44px; height: 44px; border-radius: 50%;
    background: var(--border-light); object-fit: cover;
    border: 1px solid var(--border);
  }
  .avatar-sm { width: 22px; height: 22px; }
  .avatar-xs { width: 18px; height: 18px; }
  .avatar-lg { width: 64px; height: 64px; }
  .avatar-placeholder {
    display: inline-grid; place-items: center;
    background: var(--border-light); color: var(--fg);
    font-family: 'ABCMonumentGroteskMono', monospace;
    font-size: 13px; letter-spacing: 0.05em;
  }
  .avatar-sm.avatar-placeholder, .avatar-xs.avatar-placeholder { font-size: 9px; }
  .avatar-lg.avatar-placeholder { font-size: 22px; }
  .dir-card-head { display: flex; gap: 14px; align-items: flex-start; margin-bottom: 12px; }
  .dir-card-head .info { min-width: 0; }
  .topbar .right .avatar { margin-right: -4px; }

  /* ── Calendar ── */
  .cal-toolbar {
    display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
    padding-bottom: 16px; margin-bottom: 16px; border-bottom: 1px solid var(--border);
  }
  .cal-toolbar .spacer { flex: 1; }
  .cal-nav { display: flex; gap: 4px; }
  .cal-nav button {
    padding: 6px 12px; background: transparent; color: var(--fg);
    border: 1px solid var(--border);
    font-family: 'ABCMonumentGroteskMono', monospace;
    font-size: 10px; letter-spacing: 0.1em; cursor: pointer;
  }
  .cal-nav button:hover { border-color: var(--fg); }
  .cal-view-toggle { display: flex; gap: 0; border: 1px solid var(--border); }
  .cal-view-toggle button {
    padding: 6px 14px; background: transparent; color: var(--fg);
    border: none;
    font-family: 'ABCMonumentGroteskMono', monospace;
    font-size: 10px; letter-spacing: 0.12em;
  }
  .cal-view-toggle button.active { background: var(--fg); color: var(--bg); }
  .cal-month-label {
    font-size: 18px; font-weight: 400; letter-spacing: -0.01em;
  }
  .cal-day-headers {
    display: grid; grid-template-columns: repeat(7, 1fr);
    font-family: 'ABCMonumentGroteskMono', monospace;
    font-size: 9px; letter-spacing: 0.16em; color: var(--fg);
    padding: 8px 0; border-bottom: 1px solid var(--border);
  }
  .cal-day-headers > div { text-align: left; padding-left: 8px; }
  .cal-grid {
    display: grid; grid-template-columns: repeat(7, 1fr);
    gap: 1px; background: var(--border);
    border: 1px solid var(--border); border-top: none;
  }
  .cal-day {
    background: var(--bg); min-height: 110px; padding: 6px 8px;
    cursor: pointer; position: relative;
    transition: background 0.12s ease;
    overflow: hidden;
  }
  .cal-day:hover { background: var(--border-light); }
  .cal-day-num {
    font-family: 'ABCMonumentGroteskMono', monospace;
    font-size: 11px; color: var(--fg); letter-spacing: 0.06em;
    margin-bottom: 4px;
  }
  .cal-day.today { background: var(--border-light); }
  .cal-day.today .cal-day-num { color: var(--fg); font-weight: 500; }
  .cal-day.other-month { background: var(--border-light); }
  .cal-day.other-month .cal-day-num { color: var(--fg); }
  .cal-day.other-month .cal-event { opacity: 0.5; }
  .cal-event {
    display: block; margin-top: 3px; padding: 2px 6px;
    background: var(--fg); color: var(--bg);
    font-size: 11px; line-height: 1.3; cursor: pointer;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    border: 1px solid var(--fg);
  }
  .cal-event.member { background: transparent; color: var(--fg); }
  .cal-event:hover { opacity: 0.85; }
  /* Multi-day continuation cues */
  .cal-event[data-role="start"]::after { content: ' →'; opacity: 0.7; }
  .cal-event[data-role="middle"]::before { content: '→ '; opacity: 0.7; }
  .cal-event[data-role="middle"]::after { content: ' →'; opacity: 0.7; }
  .cal-event[data-role="end"]::before { content: '→ '; opacity: 0.7; }
  @media (max-width: 720px) {
    .cal-day { min-height: 70px; padding: 4px 5px; }
    .cal-day-num { font-size: 10px; }
    .cal-event { font-size: 10px; padding: 1px 4px; }
    .cal-day-headers { font-size: 8px; }
  }
  .cal-actions { margin-bottom: 24px; }
  .event-row {
    display: grid; grid-template-columns: 90px 1fr;
    gap: 24px; padding: 18px 0; border-bottom: 1px solid var(--border);
    align-items: start;
  }
  .event-date {
    font-family: 'ABCMonumentGroteskMono', monospace; font-size: 11px;
    color: var(--fg); padding-top: 2px;
  }
  .event-date .day { font-size: 22px; font-weight: 400; display: block; line-height: 1; }
  .event-date .month { letter-spacing: 0.14em; color: var(--fg); margin-top: 4px; display: block; }
  .event-date .time { color: var(--fg); margin-top: 6px; display: block; font-size: 10px; }
  .event-body .title { font-size: 16px; font-weight: 400; margin-bottom: 6px; }
  .event-body .meta {
    font-family: 'ABCMonumentGroteskMono', monospace;
    font-size: 10px; letter-spacing: 0.12em; color: var(--fg); margin-bottom: 8px;
  }
  .event-body .meta .badge {
    display: inline-block; padding: 1px 6px; border: 1px solid var(--fg-dimmer);
    margin-right: 8px; font-size: 9px;
  }
  .event-body .meta .badge.ns { border-color: var(--fg); color: var(--fg); }
  .event-body .desc { font-size: 13px; color: var(--fg); line-height: 1.6; }
  .rsvp { display: flex; gap: 6px; flex-direction: column; align-items: flex-end; }
  .rsvp .counts { font-family: 'ABCMonumentGroteskMono', monospace; font-size: 10px; color: var(--fg); margin-bottom: 4px; }
  .rsvp .buttons { display: flex; gap: 4px; }
  .rsvp button {
    padding: 5px 10px; background: transparent; color: var(--fg);
    border: 1px solid var(--border);
    font-family: 'ABCMonumentGroteskMono', monospace;
    font-size: 9px; letter-spacing: 0.1em;
  }
  .rsvp button.active { color: var(--fg); border-color: var(--fg); background: var(--input-bg); }

  /* ── Chat ── */
  .chat-layout {
    display: grid; grid-template-columns: 200px 1fr; gap: 32px;
    height: calc(100vh - 220px); min-height: 480px;
  }
  .chat-sidebar { border-right: 1px solid var(--border); padding-right: 16px; }
  .chat-sidebar-label {
    font-family: 'ABCMonumentGroteskMono', monospace;
    font-size: 9px; letter-spacing: 0.16em; color: var(--fg); margin-bottom: 14px;
  }
  .chat-channel-list { display: flex; flex-direction: column; }
  .chat-channel-item {
    display: block; padding: 7px 0;
    font-family: 'ABCMonumentGroteskMono', monospace;
    font-size: 12px; color: var(--fg); cursor: pointer;
    border-bottom: 1px solid var(--border-light);
    text-decoration: none;
  }
  .chat-channel-item:hover { color: var(--fg); }
  .chat-channel-item.active { color: var(--fg); }
  .chat-channel-item.active::before { content: '→ '; }
  .chat-main { display: flex; flex-direction: column; min-width: 0; }
  .chat-channel-header { padding-bottom: 12px; margin-bottom: 12px; border-bottom: 1px solid var(--border); }
  .chat-channel-name { font-size: 16px; font-weight: 400; }
  .chat-channel-desc { font-size: 12px; color: var(--fg); margin-top: 3px; }
  .chat-wrap { display: flex; flex-direction: column; flex: 1; min-height: 0; }
  @media (max-width: 720px) {
    .chat-layout { grid-template-columns: 1fr; gap: 16px; height: auto; }
    .chat-sidebar {
      border-right: none; border-bottom: 1px solid var(--border);
      padding-right: 0; padding-bottom: 12px;
    }
    .chat-channel-list { flex-direction: row; flex-wrap: wrap; gap: 6px; }
    .chat-channel-item {
      border: 1px solid var(--border); padding: 4px 10px;
      border-bottom: 1px solid var(--border);
    }
    .chat-channel-item.active { background: var(--fg); color: var(--bg); border-color: var(--fg); }
    .chat-channel-item.active::before { content: ''; }
  }
  .chat-msgs { flex: 1; overflow-y: auto; padding: 8px 0; display: flex; flex-direction: column; gap: 8px; }
  .msg-row { display: grid; grid-template-columns: 100px 1fr 60px; gap: 16px; align-items: baseline; padding: 6px 0; }
  .msg-row .from {
    font-family: 'ABCMonumentGroteskMono', monospace;
    font-size: 10px; letter-spacing: 0.1em; color: var(--fg);
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .msg-row .body { font-size: 14px; color: var(--fg); line-height: 1.5; word-wrap: break-word; }
  .msg-row .ts {
    font-family: 'ABCMonumentGroteskMono', monospace;
    font-size: 9px; color: var(--fg); text-align: right;
  }
  .chat-input {
    display: flex; gap: 8px; padding-top: 12px; border-top: 1px solid var(--border);
  }
  .chat-input input {
    flex: 1; padding: 10px 12px; background: var(--input-bg); color: var(--fg);
    border: 1px solid var(--border); outline: none; font-size: 14px;
  }
  .chat-input input:focus { border-color: var(--fg); }

  /* ── Profile ── */
  .profile-form { max-width: 540px; }
  .tag-list { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 6px; }
  .tag-pill {
    display: inline-block; padding: 3px 10px; border: 1px solid var(--border);
    font-family: 'ABCMonumentGroteskMono', monospace;
    font-size: 10px; letter-spacing: 0.1em; color: var(--fg);
  }

  /* ── Admin ── */
  .admin-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 32px; }
  .admin-section h3 {
    font-family: 'ABCMonumentGroteskMono', monospace;
    font-size: 11px; letter-spacing: 0.16em; color: var(--fg);
    margin-bottom: 16px; padding-bottom: 8px; border-bottom: 1px solid var(--border);
  }
  .invite-row {
    display: grid; grid-template-columns: 1fr auto;
    gap: 12px; padding: 10px 0; border-bottom: 1px solid var(--border-light);
    align-items: center;
  }
  .invite-row .info { min-width: 0; }
  .invite-row .email { font-size: 13px; font-weight: 400; word-break: break-all; }
  .invite-row .meta {
    font-family: 'ABCMonumentGroteskMono', monospace;
    font-size: 9px; letter-spacing: 0.1em; color: var(--fg); margin-top: 3px;
  }
  .invite-row .meta .used { color: #4ade80; }
  .invite-row .meta .unused { color: var(--fg); }
  .invite-row button {
    background: none; border: 1px solid var(--border); color: var(--fg);
    font-family: 'ABCMonumentGroteskMono', monospace;
    font-size: 9px; letter-spacing: 0.1em; padding: 4px 8px;
  }
  .invite-row button:hover { border-color: var(--danger); color: var(--danger); }
  @media (max-width: 720px) { .admin-grid { grid-template-columns: 1fr; gap: 24px; } }

  /* ── Modal (event create) ── */
  .modal-bg {
    position: fixed; inset: 0; background: color-mix(in srgb, var(--bg) 90%, transparent);
    z-index: 200; display: grid; place-items: center; padding: 32px;
  }
  .modal {
    background: var(--bg); border: 1px solid var(--border);
    max-width: 540px; width: 100%; padding: 32px;
    max-height: 90vh; overflow-y: auto;
  }
  .modal-head {
    display: flex; justify-content: space-between; align-items: baseline;
    margin-bottom: 24px; padding-bottom: 16px; border-bottom: 1px solid var(--border);
  }
  .modal-head .title { font-size: 18px; font-weight: 400; }
  .modal-head .close {
    background: none; border: none; color: var(--fg);
    font-family: 'ABCMonumentGroteskMono', monospace;
    font-size: 11px; letter-spacing: 0.12em;
  }

  /* ── Mobile ── */
  @media (max-width: 720px) {
    .topbar { padding: 10px 18px; grid-template-columns: 1fr 1fr; }
    .topbar .center { display: none; }
    .tabs { padding: 0 18px; overflow-x: auto; }
    .tabs a { padding: 14px 12px 12px; }
    .tabs a:first-child { padding-left: 0; }
    .container { padding: 0 18px; }
    .event-row { grid-template-columns: 70px 1fr; gap: 16px; }
    .event-row .rsvp { grid-column: 1 / -1; align-items: flex-start; margin-top: 8px; }
    .msg-row { grid-template-columns: 90px 1fr; }
    .msg-row .ts { display: none; }
  }
</style>
</head>
<body>

<!-- Topbar always visible -->
<div class="topbar">
  <span class="brand">NATIVE STATE · MEMBERS</span>
  <span class="center mono" id="status-center"></span>
  <span class="right" id="topbar-right"></span>
</div>

<!-- Tabs visible only when signed in -->
<div class="tabs" id="tabs" style="display:none;">
  <a href="#directory" data-tab="directory">DIRECTORY</a>
  <a href="#calendar" data-tab="calendar">CALENDAR</a>
  <a href="#chat" data-tab="chat">CHAT</a>
  <a href="#profile" data-tab="profile">PROFILE</a>
  <a href="#admin" data-tab="admin" class="admin-only">ADMIN</a>
</div>

<main id="app"></main>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.4/firebase-app.js';

  serverTimestamp as rtdbServerTimestamp, query as dbQuery, limitToLast, orderByChild
} from 'https://www.gstatic.com/firebasejs/10.12.4/firebase-database.js';

  getStorage, ref as stRef, uploadBytes, getDownloadURL, deleteObject
} from 'https://www.gstatic.com/firebasejs/10.12.4/firebase-storage.js';

const FIREBASE_CONFIG = {
  apiKey: "AIzaSyBeGFAqHfBjWHKa0TSaAXwQXRYr0cUGstQ",
  authDomain: "nativestate-ac877.firebaseapp.com",
  databaseURL: "https://nativestate-ac877-default-rtdb.firebaseio.com",
  projectId: "nativestate-ac877",

// ── Helpers ─────────────────────────────────────────────────────────────────
const $ = (id) => document.getElementById(id);
const escape = (s) => String(s || '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const fmtDate = (ts) => {
  const d = ts instanceof Date ? ts : (ts?.toDate ? ts.toDate() : new Date(ts));
  return d;
};
const fmtTime = (d) => d.toLocaleTimeString([], { hour: 'numeric', minute: '2-digit' });
const fmtDateLine = (d) => d.toLocaleDateString([], { month: 'short', day: 'numeric', year: 'numeric' });
const sameDay = (a, b) => a.getFullYear() === b.getFullYear() && a.getMonth() === b.getMonth() && a.getDate() === b.getDate();
// Expand an event into a list of dates it covers (date-only, hours stripped).
function eventDates(ev) {
  const start = fmtDate(ev.start_ts);
  const end = ev.end_ts ? fmtDate(ev.end_ts) : start;
  const out = [];
  const cur = new Date(start.getFullYear(), start.getMonth(), start.getDate());
  const last = new Date(end.getFullYear(), end.getMonth(), end.getDate());
  // Cap at 31 days as a sanity limit so a malformed event can't blow up the grid.
  let safety = 0;
  while (cur.getTime() <= last.getTime() && safety++ < 60) {
    out.push(new Date(cur));
    cur.setDate(cur.getDate() + 1);
  }
  return out;
}
const avatarHtml = (profile, size = '') => {
  const cls = size ? `avatar avatar-${size}` : 'avatar';
  if (profile?.avatar) {
    return `<img class="${cls}" src="${escape(profile.avatar)}" alt="" referrerpolicy="no-referrer" />`;
  }
  const initial = (profile?.name || profile?.handle || '?').charAt(0).toUpperCase();
  return `<span class="${cls} avatar-placeholder">${escape(initial)}</span>`;
};
const tsRel = (ts) => {
  if (!ts) return '';
  const d = new Date(ts);
  const now = Date.now();
  const diff = (now - d.getTime()) / 1000;
  if (diff < 60) return 'now';
  if (diff < 3600) return Math.floor(diff / 60) + 'm';
  if (diff < 86400) return Math.floor(diff / 3600) + 'h';
  if (diff < 604800) return Math.floor(diff / 86400) + 'd';
  return d.toLocaleDateString([], { month: 'short', day: 'numeric' });
};

// ── Auth flow ───────────────────────────────────────────────────────────────
const STORE_EMAIL_KEY = 'ns_signin_email';

async function sendMagicLink(email) {
  // Firebase appends ?apiKey=...&oobCode=...&mode=signIn to this URL.
  // No hash fragment — fragments interact badly with Firebase's param injection.
  const actionCodeSettings = {
    url: location.origin + location.pathname,
    handleCodeInApp: true,
  };
  await sendSignInLinkToEmail(auth, email, actionCodeSettings);
  localStorage.setItem(STORE_EMAIL_KEY, email);
}

async function completeSignInIfPending() {
  if (!isSignInWithEmailLink(auth, location.href)) return false;
  let email = localStorage.getItem(STORE_EMAIL_KEY);
  if (!email) {
    email = window.prompt('Confirm the email you used to request the sign-in link:');
  }
  if (!email) return false;
  try {
    await signInWithEmailLink(auth, email, location.href);
    localStorage.removeItem(STORE_EMAIL_KEY);
    // Strip query/hash from URL
    history.replaceState({}, '', location.pathname);
    return true;
  } catch (e) {
    console.error('signin error', e);
    showError('Sign-in link expired or invalid. Request a new one.');
    return false;
  }
}

async function doSignOut() {
  // clear presence first
  if (state.user) {
    try { await dbSet(dbRef(rtdb, 'm/presence/' + state.user.uid), { online: false, last_seen: Date.now() }); } catch (e) {}
  }
  await signOut(auth);
}

// ── Profile ─────────────────────────────────────────────────────────────────
async function loadProfile(uid) {
  const snap = await getDoc(doc(fs, 'users', uid));
  return snap.exists() ? snap.data() : null;
}

async function ensureProfile() {
  const uid = state.user.uid;
  let profile = await loadProfile(uid);
  if (!profile) {
    // First time — check invite, create blank profile (forces user to fill in profile view)
    const email = (state.user.email || '').toLowerCase();
    const inviteSnap = await getDoc(doc(fs, 'invites', email));
    if (!inviteSnap.exists()) {
      throw new Error('Your email is not on the invite list. Contact Native State to be added.');
    }
    const invite = inviteSnap.data();
    profile = {
      handle: '',
      name: invite.name || state.user.displayName || '',
      email: email,
      bio: '',
      ig: '',
      website: '',
      avatar: state.user.photoURL || '',
      tags: [],
      joined_show: invite.joined_show || '',
      role: invite.role || 'artist',
      created_at: serverTimestamp(),
    };
    await setDoc(doc(fs, 'users', uid), profile);
    // mark invite consumed
    await updateDoc(doc(fs, 'invites', email), { used: true, used_by_uid: uid, used_at: serverTimestamp() });
  }
  state.profile = profile;
}

// ── Presence ────────────────────────────────────────────────────────────────
function startPresence() {
  if (!state.user) return;
  const ref = dbRef(rtdb, 'm/presence/' + state.user.uid);
  dbSet(ref, { online: true, last_seen: Date.now() });
  onDisconnect(ref).set({ online: false, last_seen: Date.now() });
  // listen to all presence
  const allRef = dbRef(rtdb, 'm/presence');
  const unsub = onValue(allRef, (snap) => {
    const v = snap.val() || {};
    state.presence = {};
    for (const uid in v) state.presence[uid] = v[uid].online === true;
    if (currentTab === 'directory') renderDirectory();
  });
  state.unsubs.push(unsub);
}

// ── Routing ─────────────────────────────────────────────────────────────────
let currentTab = null;

function route() {
  const hash = location.hash.replace('#', '') || (state.user ? 'directory' : 'login');
  if (!state.user || !state.profile) {
    renderLogin();
    return;
  }
  if (!state.profile.handle) {
    // Force profile completion
    currentTab = 'profile';
    setActiveTab('profile');
    renderProfile(true);
    return;
  }
  currentTab = hash;
  setActiveTab(hash);
  if      (hash === 'directory') renderDirectory();
  else if (hash === 'calendar')  renderCalendar();
  else if (hash === 'chat')      renderChat();
  else if (hash === 'profile')   renderProfile(false);
  else if (hash === 'admin')     renderAdmin();
  else { location.hash = 'directory'; }
}

window.addEventListener('hashchange', route);

  cleanupSubs();
  $('app').innerHTML = `
    <div class="container">
      <div class="view">

          <div class="view-title">Calendar</div>
          <div class="view-subtitle" id="cal-subtitle"></div>

          </div>
          <span class="spacer"></span>
          <div class="cal-view-toggle">
            <button data-view="grid">GRID</button>
            <button data-view="list">LIST</button>
          </div>
          <button class="btn" id="new-event-btn">+ POST EVENT</button>
        </div>

  `;
  $('new-event-btn').onclick = () => openEventModal();
  $('cal-prev').onclick = () => { stepMonth(-1); };
  $('cal-next').onclick = () => { stepMonth(1); };
  $('cal-today').onclick = () => {
    const now = new Date();
    state.cal.year = now.getFullYear();
    state.cal.month = now.getMonth();
    renderCalBody();
  };
  document.querySelectorAll('.cal-view-toggle button').forEach(b => {
    b.onclick = () => {
      state.cal.view = b.dataset.view;
      localStorage.setItem('m_cal_view', state.cal.view);
      renderCalBody();
    };
  });

  // Load events: a wide window so the grid can show past + future months.
  // Keep the 1-day-back floor for the list view's "upcoming" semantics.
  const since = Timestamp.fromDate(new Date(Date.now() - 90*24*3600*1000));
  const q = query(collection(fs, 'events'), where('start_ts', '>=', since), orderBy('start_ts'));
  const unsub = onSnapshot(q, (snap) => {
    state.events = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    renderCalBody();
  });
  state.unsubs.push(unsub);
}

function stepMonth(delta) {
  let m = state.cal.month + delta;
  let y = state.cal.year;
  while (m < 0) { m += 12; y--; }
  while (m > 11) { m -= 12; y++; }
  state.cal.month = m;
  state.cal.year = y;
  renderCalBody();
}

function renderCalBody() {
  // Toolbar state
  const monthLabel = new Date(state.cal.year, state.cal.month).toLocaleDateString('en-US', { month: 'long', year: 'numeric' });
  if ($('cal-month-label')) $('cal-month-label').textContent = monthLabel;
  if ($('cal-subtitle')) $('cal-subtitle').textContent = state.cal.view === 'grid' ? monthLabel.toUpperCase() : 'UPCOMING';
  document.querySelectorAll('.cal-view-toggle button').forEach(b => {
    b.classList.toggle('active', b.dataset.view === state.cal.view);
  });

  if (state.cal.view === 'grid') renderCalGrid();
  else renderEventList();
}

function renderCalGrid() {
  const body = $('cal-body');
  if (!body) return;

  const first = new Date(state.cal.year, state.cal.month, 1);
  const startOffset = first.getDay();
  const daysInMonth = new Date(state.cal.year, state.cal.month + 1, 0).getDate();
  const totalCells = Math.ceil((startOffset + daysInMonth) / 7) * 7;
  const todayStr = new Date().toDateString();

  // Group events by local date string. Multi-day events appear on every day
  // they cover, with a `role` describing position so the chip shows arrows.
  const byDate = {};
  for (const ev of state.events) {
    const dates = eventDates(ev);
    for (let i = 0; i < dates.length; i++) {
      const key = dates[i].toDateString();
      const role = dates.length === 1 ? 'single' :
                   (i === 0 ? 'start' : (i === dates.length - 1 ? 'end' : 'middle'));
      (byDate[key] = byDate[key] || []).push({ ev, role });
    }
  }

  const headers = ['SUN','MON','TUE','WED','THU','FRI','SAT'];
  let html = '<div class="cal-day-headers">' + headers.map(h => `<div>${h}</div>`).join('') + '</div>';
  html += '<div class="cal-grid">';
  for (let i = 0; i < totalCells; i++) {
    const cell = new Date(state.cal.year, state.cal.month, i - startOffset + 1);
    const isOther = cell.getMonth() !== state.cal.month;
    const isToday = cell.toDateString() === todayStr;
    const events = byDate[cell.toDateString()] || [];
    const evHtml = events.slice(0, 3).map(({ ev, role }) => {
      const t = fmtDate(ev.start_ts);
      const tStr = t.toLocaleTimeString([], { hour: 'numeric', minute: '2-digit' }).replace(' ', '');
      return `<div class="cal-event ${ev.type}" data-event-id="${ev.id}" data-role="${role}" title="${escape(ev.title)} · ${escape(tStr)}">${escape(ev.title)}</div>`;
    }).join('');
    const more = events.length > 3 ? `<div class="cal-day-num" style="margin-top:2px;">+${events.length - 3} more</div>` : '';
    // ISO date (YYYY-MM-DD) for the click handler — locale-independent
    const iso = `${cell.getFullYear()}-${String(cell.getMonth()+1).padStart(2,'0')}-${String(cell.getDate()).padStart(2,'0')}`;
    html += `
      <div class="cal-day ${isOther ? 'other-month' : ''} ${isToday ? 'today' : ''}" data-date="${iso}">
        <div class="cal-day-num">${cell.getDate()}</div>
        ${evHtml}${more}
      </div>`;
  }
  html += '</div>';
  body.innerHTML = html;

  body.querySelectorAll('.cal-event').forEach(c => {
    c.onclick = (e) => { e.stopPropagation(); openEventDetail(c.dataset.eventId); };
  });
  body.querySelectorAll('.cal-day').forEach(d => {
    d.onclick = (e) => {
      if (e.target.closest('.cal-event')) return;
      const [y, m, day] = d.dataset.date.split('-').map(Number);
      const dt = new Date(y, m - 1, day, 19, 0); // default to 7pm
      openEventModal({ start_ts: dt });
    };
  });
}

function subscribeRsvps(eventId) {
  if (state.rsvps[eventId]?.unsub) return;
  const unsub = onSnapshot(collection(fs, 'events', eventId, 'rsvps'), (snap) => {
    const m = {};
    snap.docs.forEach(d => { m[d.id] = d.data().status; });
    state.rsvps[eventId] = { ...m, unsub };
    state.myRsvps[eventId] = m[state.user.uid] || null;
    renderEventList();
  });
  state.unsubs.push(unsub);
}

function renderEventList() {
  const list = $('cal-body');
  if (!list) return;
  // List view shows only upcoming events (not past)
  const now = Date.now();
  const upcoming = state.events.filter(ev => fmtDate(ev.start_ts).getTime() >= now - 24*3600*1000);
  if (upcoming.length === 0) {
    list.innerHTML = '<div class="empty">NO UPCOMING EVENTS · POST THE FIRST ONE</div>';
    return;
  }
  list.innerHTML = upcoming.map(ev => {
    const d = fmtDate(ev.start_ts);
    const dEnd = ev.end_ts ? fmtDate(ev.end_ts) : null;
    const day = d.getDate();
    const mon = d.toLocaleDateString([], { month: 'short' }).toUpperCase();
    const time = (dEnd && sameDay(d, dEnd))
      ? `${fmtTime(d)} – ${fmtTime(dEnd)}`
      : fmtTime(d);
    const rangeLine = (dEnd && !sameDay(d, dEnd))
      ? `<span style="display:block;font-size:9px;color:var(--fg);margin-top:2px;">→ ${escape(dEnd.toLocaleDateString([], { month:'short', day:'numeric' }).toUpperCase())}</span>`
      : '';
    const host = state.members.find(m => m.uid === ev.host_uid);
    const hostHandle = host ? '@' + host.handle : (ev.type === 'ns' ? 'NATIVE STATE' : '—');
    const isHost = ev.host_uid === state.user.uid;
    const isAdmin = state.profile.role === 'admin';
    return `
      <div class="event-row" data-event-id="${ev.id}" style="cursor:pointer;">
        <div class="event-date">
          <span class="day">${day}</span>
          <span class="month">${mon}</span>
          <span class="time">${time}</span>
          ${rangeLine}
        </div>
        <div class="event-body">
          <div class="title">${escape(ev.title)}</div>
          <div class="meta">
            <span class="badge ${ev.type}">${ev.type === 'ns' ? 'NATIVE STATE' : 'MEMBER'}</span>
            ${escape(hostHandle)}${ev.location ? ' · ' + escape(ev.location) : ''}
          </div>
          ${ev.description ? `<div class="desc">${escape(ev.description)}</div>` : ''}
        </div>
      </div>`;
  }).join('');
  list.querySelectorAll('[data-event-id]').forEach(row => {
    row.onclick = () => openEventDetail(row.dataset.eventId);
  });
}

function openEventModal(prefill = {}) {
  const isAdmin = state.profile.role === 'admin';
  const editing = prefill.event || null;
  const pad = (n) => String(n).padStart(2, '0');
  const dtLocal = (d) => `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}T${pad(d.getHours())}:${pad(d.getMinutes())}`;
  const titleVal = editing ? escape(editing.title || '') : '';
  const locVal   = editing ? escape(editing.location || '') : '';
  const descVal  = editing ? escape(editing.description || '') : '';
  const startVal = editing ? dtLocal(fmtDate(editing.start_ts)) : '';
  const endVal   = editing && editing.end_ts ? dtLocal(fmtDate(editing.end_ts)) : '';
  const typeVal  = editing ? (editing.type || 'member') : 'member';
  const html = `
    <div class="modal-bg" id="modal-bg">
      <div class="modal" onclick="event.stopPropagation()">
        <div class="modal-head">
          <span class="title">${editing ? 'Edit event' : 'Post event'}</span>
          <button class="close" id="modal-close">CLOSE ×</button>
        </div>
        <form id="event-form">
          <div class="field">
            <label>TITLE</label>
            <input id="ev-title" type="text" required maxlength="120" value="${titleVal}" />
          </div>
          <div class="field">
            <label>STARTS</label>
            <input id="ev-when" type="datetime-local" required value="${startVal}" />
          </div>
          <div class="field">
            <label>ENDS (OPTIONAL)</label>
            <input id="ev-when-end" type="datetime-local" value="${endVal}" />
            <div class="hint">Leave blank for a single time. For multi-day events (e.g. June 6 – June 11), set the last day here.</div>
          </div>
          <div class="field">
            <label>LOCATION</label>
            <input id="ev-loc" type="text" placeholder="DTLA, Eastern Gallery, address…" maxlength="160" value="${locVal}" />
          </div>
          <div class="field">
            <label>DESCRIPTION</label>
            <textarea id="ev-desc" maxlength="800" placeholder="What is it? Who's it for?">${descVal}</textarea>
          </div>
          ${isAdmin ? `
          <div class="field">
            <label>TYPE</label>
            <select id="ev-type">
              <option value="member" ${typeVal === 'member' ? 'selected' : ''}>Member event</option>
              <option value="ns" ${typeVal === 'ns' ? 'selected' : ''}>Native State (official)</option>
            </select>
          </div>` : ''}
          <button class="btn" type="submit">${editing ? 'SAVE CHANGES' : 'POST EVENT'}</button>
        </form>
        <div id="ev-msg"></div>
      </div>
    </div>
  `;
  document.body.insertAdjacentHTML('beforeend', html);
  $('modal-close').onclick = closeModal;
  $('modal-bg').onclick = (e) => { if (e.target === $('modal-bg')) closeModal(); };
  // Prefill date for click-to-create flow (no editing event)
  if (!editing && prefill.start_ts) {
    const d = prefill.start_ts;
    $('ev-when').value = dtLocal(d);
    setTimeout(() => $('ev-title').focus(), 0);
  }
  if (editing) {
    setTimeout(() => $('ev-title').focus(), 0);
  }
  $('event-form').onsubmit = async (e) => {
    e.preventDefault();
    const title = $('ev-title').value.trim();
    const when = $('ev-when').value;
    const whenEnd = $('ev-when-end').value;
    const loc = $('ev-loc').value.trim();
    const desc = $('ev-desc').value.trim();
    const type = isAdmin ? $('ev-type').value : (editing ? editing.type : 'member');
    if (!title || !when) return;
    const startDate = new Date(when);
    const start_ts = Timestamp.fromDate(startDate);
    const data = {
      title, location: loc, description: desc, type, start_ts,
    };
    if (whenEnd) {
      const endDate = new Date(whenEnd);
      if (endDate.getTime() < startDate.getTime()) {
        $('ev-msg').innerHTML = '<div class="msg error">End must be on or after start.</div>';
        return;
      }
      data.end_ts = Timestamp.fromDate(endDate);
    } else if (editing && editing.end_ts) {
      // Cleared an existing end date — explicitly null it out.
      data.end_ts = null;
    }
    try {
      if (editing) {
        await updateDoc(doc(fs, 'events', editing.id), data);
      } else {
        data.host_uid = state.user.uid;
        data.created_at = serverTimestamp();
        await addDoc(collection(fs, 'events'), data);
      }
      closeModal();
    } catch (err) {
      console.error(err);
      $('ev-msg').innerHTML = '<div class="msg error">' + escape(err.message) + '</div>';
    }
  };
}
function closeModal() { const m = $('modal-bg'); if (m) m.remove(); }

function openEventDetail(eventId) {
  const ev = state.events.find(e => e.id === eventId);
  if (!ev) return;
  const d = fmtDate(ev.start_ts);
  const dEnd = ev.end_ts ? fmtDate(ev.end_ts) : null;
  let dateStr, timeStr;
  if (dEnd && !sameDay(d, dEnd)) {
    // Multi-day
    dateStr = `${d.toLocaleDateString([], { weekday: 'short', month: 'short', day: 'numeric' })} – ${dEnd.toLocaleDateString([], { weekday: 'short', month: 'short', day: 'numeric', year: 'numeric' })}`;
    timeStr = `${d.toLocaleTimeString([], { hour: 'numeric', minute: '2-digit' })} – ${dEnd.toLocaleTimeString([], { hour: 'numeric', minute: '2-digit' })}`;
  } else if (dEnd) {
    // Same day, different times
    dateStr = d.toLocaleDateString([], { weekday: 'long', month: 'long', day: 'numeric', year: 'numeric' });
    timeStr = `${d.toLocaleTimeString([], { hour: 'numeric', minute: '2-digit' })} – ${dEnd.toLocaleTimeString([], { hour: 'numeric', minute: '2-digit' })}`;
  } else {
    dateStr = d.toLocaleDateString([], { weekday: 'long', month: 'long', day: 'numeric', year: 'numeric' });
    timeStr = d.toLocaleTimeString([], { hour: 'numeric', minute: '2-digit' });
  }
  const host = state.members.find(m => m.uid === ev.host_uid);
  const hostHandle = host ? '@' + host.handle : (ev.type === 'ns' ? 'NATIVE STATE' : '—');
  const isHost = ev.host_uid === state.user.uid;
  const isAdmin = state.profile.role === 'admin';
  const html = `
    <div class="modal-bg" id="modal-bg">
      <div class="modal" onclick="event.stopPropagation()">
        <div class="modal-head">
          <span class="title">${escape(ev.title)}</span>
          <button class="close" id="modal-close">CLOSE ×</button>
        </div>
        <div style="font-family: 'ABCMonumentGroteskMono', monospace; font-size: 11px; letter-spacing: 0.1em; color: var(--fg); margin-bottom: 18px;">
          <span class="badge ${ev.type}" style="display:inline-block; padding:1px 6px; border:1px solid var(--fg-dimmer); margin-right:8px; font-size:9px;">${ev.type === 'ns' ? 'NATIVE STATE' : 'MEMBER'}</span>
          ${escape(hostHandle)}
        </div>
        <div style="margin-bottom: 6px; font-size: 14px;">${escape(dateStr)}</div>
        <div style="margin-bottom: 14px; font-family: 'ABCMonumentGroteskMono', monospace; font-size: 12px; color: var(--fg);">${escape(timeStr)}</div>
        ${ev.location ? `<div style="margin-bottom: 14px; font-size: 13px;">📍 ${escape(ev.location)}</div>` : ''}
        ${ev.description ? `<div style="font-size: 14px; color: var(--fg); line-height: 1.6; padding: 16px 0; border-top: 1px solid var(--border); border-bottom: 1px solid var(--border); margin: 16px 0;">${escape(ev.description)}</div>` : ''}
        ${(isHost || isAdmin) ? `
          <div style="display: flex; gap: 8px; margin-top: 20px;">
            <button class="btn ghost small" id="ev-detail-edit">EDIT</button>
            <button class="btn ghost small" id="ev-detail-del">DELETE</button>
          </div>
        ` : ''}
      </div>
    </div>`;
  document.body.insertAdjacentHTML('beforeend', html);
  $('modal-close').onclick = closeModal;
  $('modal-bg').onclick = (e) => { if (e.target === $('modal-bg')) closeModal(); };
  const editBtn = $('ev-detail-edit');
  if (editBtn) editBtn.onclick = () => {
    closeModal();
    openEventModal({ event: ev });
  };
  const delBtn = $('ev-detail-del');
  if (delBtn) delBtn.onclick = async () => {
    if (!confirm('Delete this event?')) return;
    try { await deleteDoc(doc(fs, 'events', ev.id)); closeModal(); }
    catch (err) { console.error(err); }
  };
}

// ── Chat view ───────────────────────────────────────────────────────────────
function renderChat() {
  cleanupSubs();
  $('app').innerHTML = `
    <div class="container">
      <div class="view">
        <div class="view-header">
          <div class="view-title">Chat</div>
          <div class="view-subtitle" id="chat-subtitle">CHANNELS</div>
        </div>
        <div class="chat-layout">
          <div class="chat-sidebar">
            <div class="chat-sidebar-label">CHANNELS</div>
            <div class="chat-channel-list" id="channel-list">
              <div class="empty" style="font-size:9px; padding: 20px 0;">LOADING…</div>
            </div>
          </div>
          <div class="chat-main">
            <div class="chat-channel-header" id="chat-channel-header"></div>
            <div class="chat-wrap">
              <div class="chat-msgs" id="chat-msgs"><div class="empty">LOADING…</div></div>
              <form class="chat-input" id="chat-form">
                <input id="chat-input" type="text" placeholder="Message…" autocomplete="off" maxlength="1500" />
                <button class="btn" type="submit">SEND</button>
              </form>
            </div>
          </div>
        </div>
      </div>
    </div>
  `;

  // Channels list
  const chQ = query(collection(fs, 'channels'), orderBy('position'));
  const unsubCh = onSnapshot(chQ, (snap) => {
    state.channels = snap.docs.map(d => ({ id: d.id, ...d.data() })).filter(c => !c.archived);
    // If saved channel doesn't exist anymore, fall back to first
    if (!state.channels.find(c => c.id === state.chat.channelId)) {
      state.chat.channelId = state.channels[0]?.id || 'general';
    }
    renderChannelList();
    renderChannelHeader();
  });
  state.unsubs.push(unsubCh);

  // Members for handle lookup
  if (state.members.length === 0) {
    const q = query(collection(fs, 'users'), orderBy('name'));
    const unsubM = onSnapshot(q, (snap) => {
      state.members = snap.docs.map(d => ({ uid: d.id, ...d.data() })).filter(u => u.handle);
      renderChatMsgs(state._currentMsgs);
    });
    state.unsubs.push(unsubM);
  }

  subscribeChannel(state.chat.channelId);

  $('chat-form').onsubmit = async (e) => {
    e.preventDefault();
    const input = $('chat-input');
    const body = input.value.trim();
    if (!body) return;
    try {
      await push(dbRef(rtdb, `m/channels/${state.chat.channelId}/messages`), {
        from_uid: state.user.uid, body, ts: rtdbServerTimestamp(),
      });
      input.value = '';
    } catch (err) {
      console.error(err);
    }
  };
}

function subscribeChannel(channelId) {
  if (state._chatUnsub) { try { state._chatUnsub(); } catch(_){} state._chatUnsub = null; }
  state.chat.channelId = channelId;
  localStorage.setItem('m_chat_channel', channelId);
  renderChannelList();
  renderChannelHeader();
  state._currentMsgs = [];
  if ($('chat-msgs')) $('chat-msgs').innerHTML = '<div class="empty">LOADING…</div>';
  if ($('chat-input')) $('chat-input').placeholder = `Message #${channelId}…`;

  const msgsRef = dbQuery(dbRef(rtdb, `m/channels/${channelId}/messages`), limitToLast(100));
  const unsub = onValue(msgsRef, (snap) => {
    const v = snap.val() || {};
    const msgs = Object.entries(v).map(([id, m]) => ({ id, ...m })).sort((a,b) => a.ts - b.ts);
    state._currentMsgs = msgs;
    renderChatMsgs(msgs);
  });
  state._chatUnsub = unsub;
  state.unsubs.push(unsub);
}

function renderChannelList() {
  const list = $('channel-list');
  if (!list) return;
  const isAdmin = state.profile?.role === 'admin';
  let html = state.channels.map(c => `
    <a class="chat-channel-item ${c.id === state.chat.channelId ? 'active' : ''}" data-channel="${escape(c.id)}">#${escape(c.name)}</a>
  `).join('');
  if (state.channels.length === 0) {
    html = '<div class="empty" style="font-size:9px;">NO CHANNELS</div>';
  }
  if (isAdmin) {
    html += `<a class="chat-channel-item" id="add-channel-link" style="color:var(--fg); margin-top: 4px;">+ NEW CHANNEL</a>`;
  }
  list.innerHTML = html;
  list.querySelectorAll('[data-channel]').forEach(a => {
    a.onclick = (e) => { e.preventDefault(); subscribeChannel(a.dataset.channel); };
  });
  if (isAdmin && $('add-channel-link')) {
    $('add-channel-link').onclick = (e) => { e.preventDefault(); openNewChannelModal(); };
  }
}

function openNewChannelModal() {
  const html = `
    <div class="modal-bg" id="modal-bg">
      <div class="modal" onclick="event.stopPropagation()">
        <div class="modal-head">
          <span class="title">New channel</span>
          <button class="close" id="modal-close">CLOSE ×</button>
        </div>
        <form id="ch-form">
          <div class="field">
            <label>CHANNEL ID</label>
            <input id="ch-name" type="text" pattern="[a-z0-9-]+" required maxlength="32" placeholder="e.g. studio-visits" />
            <div class="hint">Lowercase letters, numbers, hyphens. Used in URLs and #mentions.</div>
          </div>
          <div class="field">
            <label>DESCRIPTION (OPTIONAL)</label>
            <input id="ch-desc" type="text" maxlength="160" placeholder="What's this channel for?" />
          </div>
          <button class="btn" type="submit">CREATE</button>
        </form>
        <div id="ch-msg"></div>
      </div>
    </div>`;
  document.body.insertAdjacentHTML('beforeend', html);
  $('modal-close').onclick = closeModal;
  $('modal-bg').onclick = (e) => { if (e.target === $('modal-bg')) closeModal(); };
  setTimeout(() => $('ch-name').focus(), 0);
  $('ch-form').onsubmit = async (e) => {
    e.preventDefault();
    const id = $('ch-name').value.trim().toLowerCase().replace(/[^a-z0-9-]/g, '');
    const desc = $('ch-desc').value.trim();
    if (!id) {
      $('ch-msg').innerHTML = '<div class="msg error">Invalid channel ID.</div>';
      return;
    }
    if (state.channels.find(c => c.id === id)) {
      $('ch-msg').innerHTML = '<div class="msg error">That channel already exists.</div>';
      return;
    }
    try {
      const maxPos = Math.max(0, ...(state.channels || []).map(c => c.position || 0));
      await setDoc(doc(fs, 'channels', id), {
        name: id, description: desc, position: maxPos + 1, archived: false,
        created_at: serverTimestamp(),
      });
      closeModal();
      subscribeChannel(id);
    } catch (err) {
      console.error(err);
      $('ch-msg').innerHTML = '<div class="msg error">' + escape(err.message) + '</div>';
    }
  };
}

function renderChannelHeader() {
  const h = $('chat-channel-header');
  if (!h) return;
  const ch = state.channels.find(c => c.id === state.chat.channelId);
  if (!ch) { h.innerHTML = `<div class="chat-channel-name"># ${escape(state.chat.channelId)}</div>`; return; }
  h.innerHTML = `
    <div class="chat-channel-name"># ${escape(ch.name)}</div>
    ${ch.description ? `<div class="chat-channel-desc">${escape(ch.description)}</div>` : ''}
  `;
}

function renderChatMsgs(msgs) {
  const c = $('chat-msgs');
  if (!c) return;
  if (msgs.length === 0) {
    c.innerHTML = '<div class="empty">NO MESSAGES YET · SAY HI</div>';
    return;
  }
  const handle = (uid) => {
    const m = state.members.find(x => x.uid === uid);
    return m ? '@' + m.handle : uid.slice(0, 6);
  };
  const member = (uid) => state.members.find(x => x.uid === uid);
  c.innerHTML = msgs.map(m => {
    const mem = member(m.from_uid);
    return `
    <div class="msg-row">
      <div class="from" style="display:flex; align-items:center; gap:6px;">
        ${avatarHtml(mem, 'xs')}
        <span style="overflow:hidden; text-overflow:ellipsis;">${escape(handle(m.from_uid))}</span>
      </div>
      <div class="body">${escape(m.body)}</div>
      <div class="ts mono">${tsRel(m.ts)}</div>
    </div>`;
  }).join('');
  c.scrollTop = c.scrollHeight;
}

// ── Profile view ────────────────────────────────────────────────────────────
function renderProfile(forceComplete) {
  cleanupSubs();
  const p = state.profile || {};
  const required = forceComplete && !p.handle;
  $('app').innerHTML = `
    <div class="container">
      <div class="view">
        <div class="view-header">
          <div class="view-title">${required ? 'Complete your profile' : 'Profile'}</div>
          <div class="view-subtitle">${required ? 'PICK A HANDLE TO CONTINUE' : '@' + escape(p.handle)}</div>
        </div>
        ${required ? '<div class="msg">Set your handle and name to continue. Everything else is optional and editable later.</div>' : ''}
        <form class="profile-form" id="profile-form">
          <div class="field">
            <label>PROFILE PHOTO</label>
            <div style="display:flex; align-items:center; gap: 16px;">
              <div id="p-avatar-host">${avatarHtml(p, 'lg')}</div>
              <input id="p-avatar-file" type="file" accept="image/*" style="display:none;" />
              <button class="btn ghost small" type="button" id="p-avatar-btn">UPLOAD</button>
              ${p.avatar ? '<button class="btn ghost small" type="button" id="p-avatar-clear">REMOVE</button>' : ''}
              <span id="p-avatar-msg" class="mono" style="font-size:10px; color:var(--fg); letter-spacing:0.12em;"></span>
            </div>
            <div class="hint">JPG/PNG, &lt; 2MB.</div>
          </div>
          <div class="field">
            <label>HANDLE *</label>
            <input id="p-handle" type="text" pattern="[a-z0-9_]+" required value="${escape(p.handle || '')}" placeholder="e.g. seungmin" />
            <div class="hint">Lowercase, no spaces. Used in @mentions.</div>
          </div>
          <div class="field">
            <label>NAME *</label>
            <input id="p-name" type="text" required value="${escape(p.name || '')}" />
          </div>
          <div class="field">
            <label>BIO</label>
            <textarea id="p-bio" maxlength="280" placeholder="One-liner about your work">${escape(p.bio || '')}</textarea>
          </div>
          <div class="field">
            <label>INSTAGRAM</label>
            <input id="p-ig" type="text" value="${escape(p.ig || '')}" placeholder="@handle" />
          </div>
          <div class="field">
            <label>WEBSITE</label>
            <input id="p-web" type="url" value="${escape(p.website || '')}" placeholder="https://" />
          </div>
          <div class="field">
            <label>TAGS</label>
            <input id="p-tags" type="text" value="${escape((p.tags || []).join(', '))}" placeholder="light, noise, code, sculpture" />
            <div class="hint">Comma-separated. Helps people find your work in the directory.</div>
          </div>
          <div class="field">
            <label>JOINED AT</label>
            <input id="p-joined" type="text" value="${escape(p.joined_show || '')}" placeholder="Native State 1.0" />
          </div>
          <button class="btn" type="submit">SAVE</button>
          <span id="p-msg" style="margin-left: 16px;"></span>
        </form>
      </div>
    </div>
  `;
  $('profile-form').onsubmit = async (e) => {
    e.preventDefault();
    const handle = $('p-handle').value.trim().toLowerCase().replace(/[^a-z0-9_]/g, '');
    const name = $('p-name').value.trim();
    if (!handle || !name) return;
    const updates = {
      handle, name,
      bio: $('p-bio').value.trim(),
      ig: $('p-ig').value.trim(),
      website: $('p-web').value.trim(),
      tags: $('p-tags').value.split(',').map(t => t.trim().toLowerCase()).filter(Boolean),
      joined_show: $('p-joined').value.trim(),
    };
    try {
      await updateDoc(doc(fs, 'users', state.user.uid), updates);
      state.profile = { ...state.profile, ...updates };
      $('p-msg').innerHTML = '<span class="mono" style="font-size: 10px; color: var(--fg); letter-spacing: 0.12em;">SAVED</span>';
      renderTopbar();
      if (forceComplete) location.hash = 'directory';
    } catch (err) {
      console.error(err);
      $('p-msg').innerHTML = '<span class="msg error">' + escape(err.message) + '</span>';
    }
  };

  // ── Avatar upload ──
  $('p-avatar-btn').onclick = () => $('p-avatar-file').click();
  $('p-avatar-file').onchange = async (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const msg = $('p-avatar-msg');
    if (file.size > 2 * 1024 * 1024) {
      msg.innerHTML = '<span style="color: var(--danger);">FILE > 2MB</span>';
      return;
    }
    msg.textContent = 'UPLOADING…';
    try {
      const r = stRef(storage, 'avatars/' + state.user.uid);
      await uploadBytes(r, file, { contentType: file.type });
      const url = await getDownloadURL(r);
      // Append a cache-buster so the new image shows immediately
      const cacheBustedUrl = url + '&t=' + Date.now();
      await updateDoc(doc(fs, 'users', state.user.uid), { avatar: cacheBustedUrl });
      state.profile.avatar = cacheBustedUrl;
      $('p-avatar-host').innerHTML = avatarHtml(state.profile, 'lg');
      msg.textContent = 'SAVED';
      renderTopbar();
      // Re-render form to show REMOVE button if it wasn't there
      if (!document.getElementById('p-avatar-clear')) renderProfile(false);
    } catch (err) {
      console.error(err);
      msg.innerHTML = '<span style="color: var(--danger);">' + escape(err.message) + '</span>';
    }
  };
  const clearBtn = $('p-avatar-clear');
  if (clearBtn) clearBtn.onclick = async () => {
    if (!confirm('Remove profile photo?')) return;
    const msg = $('p-avatar-msg');
    msg.textContent = 'REMOVING…';
    try {
      try { await deleteObject(stRef(storage, 'avatars/' + state.user.uid)); } catch (_) {}
      await updateDoc(doc(fs, 'users', state.user.uid), { avatar: '' });
      state.profile.avatar = '';
      renderProfile(false);
      renderTopbar();
    } catch (err) {
      console.error(err);
      msg.innerHTML = '<span style="color: var(--danger);">' + escape(err.message) + '</span>';
    }
  };
}

                <label>EMAIL</label>
                <input id="ai-email" type="email" required placeholder="artist@example.com" />
              </div>
              <div class="field">
                <label>NAME</label>
                <input id="ai-name" type="text" required placeholder="Full name" />
              </div>
              <div class="field">
                <label>JOINED SHOW</label>
                <input id="ai-show" type="text" placeholder="Native State 4.0" />
              </div>
              <div class="field">
                <label>ROLE</label>
                <select id="ai-role">
                  <option value="artist" selected>Artist</option>
                  <option value="admin">Admin</option>
                </select>
              </div>
              <button class="btn" type="submit">ADD INVITE</button>
              <span id="ai-msg" style="margin-left: 12px;"></span>
            </form>

            <h3 style="margin-top: 40px;">BULK ADD</h3>
            <div class="field">
              <label>CSV (one per line: email,name,joined_show,role)</label>
              <textarea id="bulk-csv" rows="6" placeholder="alice@example.com,Alice Smith,Native State 1.0,artist
bob@example.com,Bob Jones,Native State 2.0,artist"></textarea>
              <div class="hint">Existing invites with the same email are updated, not duplicated.</div>
            </div>
            <button class="btn" id="bulk-add-btn">IMPORT</button>
            <span id="bulk-msg" style="margin-left: 12px;"></span>
          </div>

          <div class="admin-section">
            <h3>EXISTING INVITES</h3>
            <div id="invite-list"><div class="empty">LOADING…</div></div>
          </div>
        </div>

        <div class="admin-section" style="margin-top: 48px;">
          <h3>CHANNELS</h3>
          <div class="admin-grid" style="grid-template-columns: 1fr 1fr;">
            <div>
              <form id="add-channel-form">
                <div class="field">
                  <label>CHANNEL ID</label>
                  <input id="ach-name" type="text" pattern="[a-z0-9-]+" required maxlength="32" placeholder="e.g. studio-visits" />
                  <div class="hint">Lowercase, hyphens only. Used in URLs and #mentions.</div>
                </div>
                <div class="field">
                  <label>DESCRIPTION</label>
                  <input id="ach-desc" type="text" maxlength="160" placeholder="What's this channel for?" />
                </div>
                <button class="btn" type="submit">CREATE CHANNEL</button>
                <span id="ach-msg" style="margin-left: 12px;"></span>
              </form>
            </div>
            <div>
              <div id="channel-admin-list"><div class="empty">LOADING…</div></div>
            </div>
          </div>
        </div>
      </div>
    </div>
  `;

  // Subscribe to invites collection
  const unsub = onSnapshot(collection(fs, 'invites'), (snap) => {
    const invs = snap.docs.map(d => ({ email: d.id, ...d.data() }))
      .sort((a, b) => (a.invited_at?.seconds || 0) > (b.invited_at?.seconds || 0) ? -1 : 1);
    renderInviteList(invs);
    $('invite-count').textContent = invs.length;
  }, (err) => {
    console.error(err);
    $('invite-list').innerHTML = `<div class="msg error">${escape(err.message)}</div>`;
  });
  state.unsubs.push(unsub);

  // Add single invite
  $('add-invite-form').onsubmit = async (e) => {
    e.preventDefault();
    const email = $('ai-email').value.trim().toLowerCase();
    const name = $('ai-name').value.trim();
    const joined_show = $('ai-show').value.trim();
    const role = $('ai-role').value;
    const msg = $('ai-msg');
    if (!email.includes('@') || !name) {
      msg.innerHTML = '<span class="msg error" style="display:inline-block;padding:4px 8px;">Email and name required.</span>';
      return;
    }
    try {
      await setDoc(doc(fs, 'invites', email), {
        name, joined_show, role,
        invited_at: serverTimestamp(),
        used: false,
      }, { merge: true });
      msg.innerHTML = '<span class="mono" style="font-size:10px;color:var(--fg);letter-spacing:0.12em;">ADDED</span>';
      $('add-invite-form').reset();
      setTimeout(() => msg.innerHTML = '', 2000);
    } catch (err) {
      console.error(err);
      msg.innerHTML = `<span class="msg error" style="display:inline-block;padding:4px 8px;">${escape(err.message)}</span>`;
    }
  };

  // Channels admin: subscribe + list + create
  const chQ = query(collection(fs, 'channels'), orderBy('position'));
  const unsubCh = onSnapshot(chQ, (snap) => {
    const chs = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    const list = $('channel-admin-list');
    if (!list) return;
    if (chs.length === 0) {
      list.innerHTML = '<div class="empty">NO CHANNELS YET</div>';
      return;
    }
    list.innerHTML = chs.map(c => `
      <div class="invite-row">
        <div class="info">
          <div class="email">#${escape(c.name)}</div>
          <div class="meta">${escape(c.description || '—')}${c.archived ? ' · <span class="used">ARCHIVED</span>' : ''}</div>
        </div>
        <button data-archive-ch="${escape(c.id)}">${c.archived ? 'RESTORE' : 'ARCHIVE'}</button>
      </div>
    `).join('');
    list.querySelectorAll('[data-archive-ch]').forEach(b => {
      b.onclick = async () => {
        const id = b.dataset.archiveCh;
        const ch = chs.find(c => c.id === id);
        if (!ch) return;
        if (!confirm((ch.archived ? 'Restore' : 'Archive') + ' #' + ch.name + '?')) return;
        try { await updateDoc(doc(fs, 'channels', id), { archived: !ch.archived }); }
        catch (err) { alert(err.message); }
      };
    });
  });
  state.unsubs.push(unsubCh);

  $('add-channel-form').onsubmit = async (e) => {
    e.preventDefault();
    const id = $('ach-name').value.trim().toLowerCase().replace(/[^a-z0-9-]/g, '');
    const desc = $('ach-desc').value.trim();
    const msg = $('ach-msg');
    if (!id) {
      msg.innerHTML = '<span class="msg error" style="display:inline-block;padding:4px 8px;">Invalid channel ID.</span>';
      return;
    }
    try {
      const maxPos = Math.max(0, ...(state.channels || []).map(c => c.position || 0));
      await setDoc(doc(fs, 'channels', id), {
        name: id, description: desc, position: maxPos + 1, archived: false,
        created_at: serverTimestamp(),
      });
      $('add-channel-form').reset();
      msg.innerHTML = '<span class="mono" style="font-size:10px;color:var(--fg);letter-spacing:0.12em;">CREATED</span>';
      setTimeout(() => msg.innerHTML = '', 2000);
    } catch (err) {
      msg.innerHTML = `<span class="msg error" style="display:inline-block;padding:4px 8px;">${escape(err.message)}</span>`;
    }
  };

  // Bulk import
  $('bulk-add-btn').onclick = async () => {
    const text = $('bulk-csv').value.trim();
    const msg = $('bulk-msg');
    if (!text) return;
    const lines = text.split('\n').map(l => l.trim()).filter(Boolean);
    let ok = 0, fail = 0;
    msg.innerHTML = '<span class="mono" style="font-size:10px;color:var(--fg);letter-spacing:0.12em;">IMPORTING…</span>';
    const batch = writeBatch(fs);
    for (const line of lines) {
      const [emailRaw, nameRaw, showRaw, roleRaw] = line.split(',').map(s => (s || '').trim());
      const email = (emailRaw || '').toLowerCase();
      if (!email.includes('@') || !nameRaw) { fail++; continue; }
      batch.set(doc(fs, 'invites', email), {
        name: nameRaw,
        joined_show: showRaw || '',
        role: roleRaw || 'artist',
        invited_at: serverTimestamp(),
        used: false,
      }, { merge: true });
      ok++;
    }
    try {
      await batch.commit();
      msg.innerHTML = `<span class="mono" style="font-size:10px;color:var(--fg);letter-spacing:0.12em;">IMPORTED ${ok}${fail ? ' · SKIPPED ' + fail : ''}</span>`;
      $('bulk-csv').value = '';
      setTimeout(() => msg.innerHTML = '', 4000);
    } catch (err) {
      console.error(err);
      msg.innerHTML = `<span class="msg error" style="display:inline-block;padding:4px 8px;">${escape(err.message)}</span>`;
    }
  };
}

function renderInviteList(invs) {
  const list = $('invite-list');
  if (!list) return;
  if (invs.length === 0) {
    list.innerHTML = '<div class="empty">NO INVITES YET</div>';
    return;
  }
  list.innerHTML = invs.map(inv => {
    const usedTag = inv.used
      ? '<span class="used">USED</span>'
      : '<span class="unused">PENDING</span>';
    const meta = [
      escape(inv.name || '—'),
      inv.joined_show ? escape(inv.joined_show) : null,
      escape((inv.role || 'artist').toUpperCase()),
      usedTag,
    ].filter(Boolean).join(' · ');
    return `
      <div class="invite-row">
        <div class="info">
          <div class="email">${escape(inv.email)}</div>
          <div class="meta">${meta}</div>
        </div>
        <button data-del-inv="${escape(inv.email)}" ${inv.used ? 'disabled' : ''}>${inv.used ? '—' : 'REVOKE'}</button>
      </div>`;
  }).join('');
  list.querySelectorAll('[data-del-inv]').forEach(b => {
    b.onclick = async () => {
      const email = b.dataset.delInv;
      if (!confirm('Revoke invite for ' + email + '?')) return;
      try { await deleteDoc(doc(fs, 'invites', email)); }
      catch (err) { alert(err.message); }
    };
  });
}

// ── Boot ────────────────────────────────────────────────────────────────────
async function boot() {
  // If this is an email-link sign-in completion, finish it before checking auth state
  await completeSignInIfPending();

  onAuthStateChanged(auth, async (user) => {
    cleanupSubs();
    state.user = user;
    if (!user) {
      state.profile = null;
      renderTopbar();
      renderLogin();
      return;
    }
    try {
      await ensureProfile();
    } catch (e) {
      console.error(e);
      await signOut(auth);
      $('app').innerHTML = `<div class="container"><div class="view"><div class="msg error">${escape(e.message)}</div></div></div>`;
      return;
    }
    renderTopbar();
    startPresence();
    if (!location.hash || location.hash === '#login') {
      location.hash = state.profile.handle ? 'directory' : 'profile';
    } else {
      route();
    }
  });
}

boot();
</script>

</body>
</html>
